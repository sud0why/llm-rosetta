name: argo_anthropic
base: anthropic
default_base_url: https://apps.inside.anl.gov/argoapi
default_api_key_env: ARGO_API_KEY
model_id_field: internal_id
reasoning:
  disabled: thinking_disabled
  effort_field: output_config.effort
  thinking_type: enabled
  effort_map:
    minimal: low
    low: low
    medium: medium
    high: high
    xhigh: xhigh
    max: max
  model_overrides:
    claudeopus47:
      thinking_type: adaptive
